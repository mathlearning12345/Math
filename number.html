<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number — Maths Applets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e4e4e0;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    header a { text-decoration: none; color: #999; font-size: 0.9rem; }
    header a:hover { color: #4a7fe8; }
    header .sep { color: #ddd; font-size: 0.9rem; }
    header .current { color: #1a1a1a; font-weight: 600; font-size: 0.9rem; }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 3.5rem 2rem;
    }

    .page-header { margin-bottom: 3rem; }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.4rem;
    }

    .page-header p {
      font-size: 0.95rem;
      color: #888;
    }

    /* Subtopic section */
    .subtopic { margin-bottom: 3rem; }

    .subtopic-heading {
      font-size: 0.68rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #aaa;
      font-weight: 600;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid #ebebeb;
    }

    .applet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .applet-card {
      background: #fff;
      border: 1px solid #e4e4e0;
      border-radius: 12px;
      padding: 1.4rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .applet-card h3 {
      font-size: 0.98rem;
      font-weight: 600;
    }

    .applet-card p {
      font-size: 0.82rem;
      color: #999;
      line-height: 1.5;
      flex: 1;
    }

    .launch-btn {
      display: inline-block;
      margin-top: 0.9rem;
      text-decoration: none;
      background: #4a7fe8;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 7px;
      transition: background 0.15s;
      align-self: flex-start;
    }

    .launch-btn:hover { background: #3a6fd8; }

    footer {
      text-align: center;
      padding: 2.5rem 2rem;
      font-size: 0.8rem;
      color: #ccc;
      border-top: 1px solid #eee;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html">Maths Applets</a>
  <span class="sep">›</span>
  <span class="current">Number</span>
</header>

<main>
  <div class="page-header">
    <h1>Number</h1>
    <p>Practice and explore number concepts with interactive applets.</p>
  </div>

  <!-- SUBTOPIC: TIMES TABLES -->
  <div class="subtopic">
    <p class="subtopic-heading">Times Tables</p>
    <div class="applet-grid">

      <div class="applet-card">
        <h3>Times Table Practice</h3>
        <p>Test your multiplication skills with interactive times table questions.</p>
        <a class="launch-btn" href="times_table.html">Launch applet →</a>
        <!-- NOTE: rename your file to times_table.html (no spaces) or update the href above to match your filename exactly -->
      </div>

      <!-- TO ADD ANOTHER APPLET UNDER TIMES TABLES: copy the card above and update the title, description and href -->

    </div>
  </div>

  <!-- TO ADD A NEW SUBTOPIC: copy the subtopic block above and update the heading and applet cards -->

    <p class="subtopic-heading">Fractions</p>
    <div class="applet-grid">
      <div class="applet-card">
        <h3>Fraction Basics</h3>
        <p>Explore equivalent fractions and simplification.</p>
        <a class="launch-btn" href="your_applet_filename.html">Launch applet →</a>
      </div>
    </div>
  </div>
  -->

</main>

<footer>
  <a href="index.html" style="color:#bbb; text-decoration:none;">← Back to all topics</a>
</footer>

</body>
</html>
